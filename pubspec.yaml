name: google_business_profile_manager
version: 1.0.1+2
description: Local-first, AI-augmented Google Business Profile manager for mobile, web, and desktop.
publish_to: "none"

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Local-first storage
  drift: ^2.28.2
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.6
  path: ^1.9.1

  # Networking & AI
  dio: ^5.10.0
  google_generative_ai: ^0.4.7

  # Voice
  speech_to_text: ^7.4.0

  # Maps & geolocation (OSM, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.4

  # Media
  image_picker: ^1.2.3
  image_cropper: ^8.1.0

  # Contact helpers
  intl_phone_field: ^3.2.0

  # Monetization (mobile only, graceful no-op elsewhere)
  google_mobile_ads: ^9.0.0

  # UX
  url_launcher: ^6.3.0
  confetti: ^0.8.0
  cupertino_icons: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  drift_dev: ^2.28.2
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
