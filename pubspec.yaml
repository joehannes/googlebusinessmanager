name: google_business_profile_manager
version: 1.0.0+1
description: Local-first, AI-augmented Google Business Profile manager for mobile, web, and desktop.
publish_to: "none"

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.4
  riverpod_annotation: ^2.5.0
  go_router: ^14.2.0
  drift: ^2.5.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_secure_storage: ^9.0.3
  dio: ^5.0.0
  google_generative_ai: ^0.8.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  image_picker: ^1.0.0
  image_cropper: ^8.0.0
  intl_phone_field: ^3.0.0
  speech_to_text: ^6.0.0
  google_mobile_ads: ^5.0.0
  cupertino_icons: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.16.0
  riverpod_generator: ^2.5.0
  drift_dev: ^2.5.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
